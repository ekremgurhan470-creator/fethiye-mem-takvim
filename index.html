<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fethiye İlçe MEM Etkinlik Takvimi</title>

  <!-- PWA Meta Etiketleri -->
  <meta name="theme-color" content="#1a237e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MEM Takvim">
  <meta name="description" content="Fethiye İlçe Milli Eğitim Müdürlüğü Etkinlik Takvimi">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS İkon -->
  <link rel="apple-touch-icon" href="ikon.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a237e, #1565c0);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .yukleniyorEkran {
      text-align: center;
      color: white;
    }

    .logo {
      width: 100px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 18px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    p {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: none;
    }
  </style>
</head>
<body>

  <div class="yukleniyorEkran" id="yukleniyorEkran">
    <img src="ikon.png" class="logo" alt="MEM Logo">
    <h1>Fethiye İlçe MEM</h1>
    <p>Etkinlik Takvimi yükleniyor...</p>
    <div class="spinner"></div>
  </div>

  <iframe
    id="uygulama"
    src="https://script.google.com/u/0/home/projects/1b30-Ndqi8mGO1hkSF0gx-EGN6fUmGCIW7XfQc9WxyXQheKMNzYbOMU0X/edit"
    onload="iframeYuklendi()"
    allow="fullscreen">
  </iframe>

  <!-- PWA Service Worker Kaydı -->
  <script>
    function iframeYuklendi() {
      document.getElementById('yukleniyorEkran').style.display = 'none';
      document.getElementById('uygulama').style.display = 'block';
    }

    // Service Worker kaydet
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js')
          .then(function(reg) { console.log('SW kayıtlı:', reg.scope); })
          .catch(function(err) { console.log('SW hatası:', err); });
      });
    }
  </script>

</body>
</html>
